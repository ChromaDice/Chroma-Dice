<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chroma Dice</title>
<meta name="author" content="@SaintAlive">
<meta name="copyright" content="© 2026 @SaintAlive — ChromaDice — All Rights Reserved">
<meta name="application-name" content="ChromaDice">
<meta name="description" content="ChromaDice by @SaintAlive — Cryptographically secure dice roller. © 2026 All Rights Reserved.">
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;600;800&family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:wght@600;700&family=Audiowide&family=Archivo+Black&display=swap');


:root{
  --bg-gradient:
    radial-gradient(circle at 20% 10%, #2d1b4e 0%, transparent 50%),
    radial-gradient(circle at 80% 90%, #0d3b3b 0%, transparent 50%),
    radial-gradient(circle at center, #1a0f2e 0%, #08051a 100%);
  --header-font: 'Bungee', system-ui;
  --header-tracking: 4px;
  --header-gradient: linear-gradient(90deg, #5eead4, #a5f3fc, #d8b4fe);
  --body-color: #ffffff;
  --subtitle-color: rgba(94, 234, 212, 0.9);

  --badge-bg: linear-gradient(135deg, rgba(20,184,166,0.15), rgba(168,85,247,0.15));
  --badge-border: rgba(20,184,166,0.4);
  --badge-accent-1: #14b8a6;
  --badge-accent-2: #a855f7;

  --felt-bg: radial-gradient(circle at 50% 35%, #0f766e 0%, #042f2e 70%, #022020 100%);
  --felt-border: #134e4a;
  --felt-inset-glow: rgba(20,184,166,0.15);
  --felt-outer-glow: rgba(20,184,166,0.3);
  --felt-dash: rgba(20,184,166,0.2);

  --panel-bg: rgba(15, 23, 42, 0.7);
  --panel-border-prev: rgba(245, 158, 11, 0.4);
  --panel-border-colors: rgba(168, 85, 247, 0.4);
  --label-prev: #fcd34d;
  --label-colors: #d8b4fe;

  --btn-primary: linear-gradient(90deg, #14b8a6, #2dd4bf, #14b8a6);
  --btn-primary-hover: linear-gradient(90deg, #2dd4bf, #2dd4bf);
  --btn-primary-text: #ffffff;
  --btn-secondary-bg: #1e293b;
  --btn-secondary-hover-bg: #334155;
  --btn-secondary-text: #ffffff;

  --footer-color: rgba(94, 234, 212, 0.4);
  --slider-accent: #2dd4bf;

  --dice-radius: 28px;
}


[data-theme="forest"]{
  --bg-gradient:
    radial-gradient(circle at 25% 15%, #1e3a2e 0%, transparent 55%),
    radial-gradient(circle at 75% 85%, #14532d 0%, transparent 55%),
    radial-gradient(circle at center, #0a1f15 0%, #030f08 100%);
  --header-font: 'Cormorant Garamond', serif;
  --header-tracking: 3px;
  --header-gradient: linear-gradient(90deg, #d9f99d, #fef3c7, #bef264);
  --subtitle-color: rgba(190, 242, 100, 0.75);

  --badge-bg: linear-gradient(135deg, rgba(132,204,22,0.12), rgba(217,249,157,0.08));
  --badge-border: rgba(190, 242, 100, 0.35);
  --badge-accent-1: #84cc16;
  --badge-accent-2: #d9f99d;

  --felt-bg: radial-gradient(circle at 50% 35%, #166534 0%, #14532d 60%, #052e16 100%);
  --felt-border: #1a2e05;
  --felt-inset-glow: rgba(132, 204, 22, 0.12);
  --felt-outer-glow: rgba(132, 204, 22, 0.25);
  --felt-dash: rgba(190, 242, 100, 0.2);

  --panel-bg: rgba(20, 50, 30, 0.55);
  --panel-border-prev: rgba(217, 249, 157, 0.35);
  --panel-border-colors: rgba(190, 242, 100, 0.35);
  --label-prev: #d9f99d;
  --label-colors: #bef264;

  --btn-primary: linear-gradient(90deg, #4d7c0f, #65a30d, #4d7c0f);
  --btn-primary-hover: linear-gradient(90deg, #65a30d, #84cc16);
  --btn-primary-text: #f7fee7;
  --btn-secondary-bg: #1a2e05;
  --btn-secondary-hover-bg: #365314;

  --footer-color: rgba(190, 242, 100, 0.45);
  --slider-accent: #84cc16;
  --dice-radius: 26px;
}


[data-theme="vapor"]{
  --bg-gradient:
    radial-gradient(circle at 20% 20%, #831843 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, #155e75 0%, transparent 50%),
    linear-gradient(180deg, #1e1b4b 0%, #0c0a2e 100%);
  --header-font: 'Audiowide', system-ui;
  --header-tracking: 4px;
  --header-gradient: linear-gradient(90deg, #f0abfc, #ffffff, #67e8f9);
  --subtitle-color: rgba(240, 171, 252, 0.85);

  --badge-bg: linear-gradient(135deg, rgba(232,121,249,0.18), rgba(103,232,249,0.14));
  --badge-border: rgba(232, 121, 249, 0.45);
  --badge-accent-1: #e879f9;
  --badge-accent-2: #67e8f9;

  --felt-bg: radial-gradient(circle at 50% 35%, #4c1d95 0%, #2e1065 60%, #0c0a2e 100%);
  --felt-border: #581c87;
  --felt-inset-glow: rgba(232, 121, 249, 0.2);
  --felt-outer-glow: rgba(232, 121, 249, 0.4);
  --felt-dash: rgba(103, 232, 249, 0.3);

  --panel-bg: rgba(30, 27, 75, 0.65);
  --panel-border-prev: rgba(103, 232, 249, 0.4);
  --panel-border-colors: rgba(232, 121, 249, 0.4);
  --label-prev: #67e8f9;
  --label-colors: #f0abfc;

  --btn-primary: linear-gradient(90deg, #c026d3, #e879f9, #c026d3);
  --btn-primary-hover: linear-gradient(90deg, #e879f9, #f0abfc);
  --btn-primary-text: #ffffff;
  --btn-secondary-bg: #312e81;
  --btn-secondary-hover-bg: #4338ca;

  --footer-color: rgba(240, 171, 252, 0.5);
  --slider-accent: #e879f9;
  --dice-radius: 18px;
}


[data-theme="royal"]{
  --bg-gradient:
    radial-gradient(circle at 25% 15%, #4c0519 0%, transparent 55%),
    radial-gradient(circle at 75% 85%, #1c0a05 0%, transparent 55%),
    radial-gradient(circle at center, #2a0a0a 0%, #0a0303 100%);
  --header-font: 'Playfair Display', serif;
  --header-tracking: 2px;
  --header-gradient: linear-gradient(90deg, #fbbf24, #fde68a, #d97706);
  --subtitle-color: rgba(253, 230, 138, 0.85);

  --badge-bg: linear-gradient(135deg, rgba(217,119,6,0.18), rgba(76,5,25,0.4));
  --badge-border: rgba(251, 191, 36, 0.45);
  --badge-accent-1: #fbbf24;
  --badge-accent-2: #f59e0b;

  --felt-bg: radial-gradient(circle at 50% 35%, #7f1d1d 0%, #450a0a 65%, #1a0303 100%);
  --felt-border: #d97706;
  --felt-inset-glow: rgba(251, 191, 36, 0.18);
  --felt-outer-glow: rgba(217, 119, 6, 0.4);
  --felt-dash: rgba(251, 191, 36, 0.4);

  --panel-bg: rgba(28, 10, 5, 0.7);
  --panel-border-prev: rgba(251, 191, 36, 0.45);
  --panel-border-colors: rgba(251, 191, 36, 0.45);
  --label-prev: #fde68a;
  --label-colors: #fde68a;

  --btn-primary: linear-gradient(90deg, #b45309, #f59e0b, #b45309);
  --btn-primary-hover: linear-gradient(90deg, #d97706, #fbbf24);
  --btn-primary-text: #1a0303;
  --btn-secondary-bg: #450a0a;
  --btn-secondary-hover-bg: #7f1d1d;

  --footer-color: rgba(251, 191, 36, 0.5);
  --slider-accent: #fbbf24;
  --dice-radius: 30px;
}


[data-theme="mono"]{
  --bg-gradient: linear-gradient(180deg, #0a0a0a 0%, #000000 100%);
  --header-font: 'Archivo Black', sans-serif;
  --header-tracking: 1px;
  --header-gradient: linear-gradient(90deg, #ffffff, #ffffff);
  --subtitle-color: rgba(255, 255, 255, 0.5);

  --badge-bg: rgba(255,255,255,0.05);
  --badge-border: rgba(255, 255, 255, 0.4);
  --badge-accent-1: #ffffff;
  --badge-accent-2: #a3a3a3;

  --felt-bg: radial-gradient(circle at 50% 35%, #1a1a1a 0%, #0a0a0a 70%, #000000 100%);
  --felt-border: #ffffff;
  --felt-inset-glow: rgba(255, 255, 255, 0.04);
  --felt-outer-glow: rgba(255, 255, 255, 0.12);
  --felt-dash: rgba(255, 255, 255, 0.3);

  --panel-bg: rgba(10, 10, 10, 0.75);
  --panel-border-prev: rgba(255, 255, 255, 0.4);
  --panel-border-colors: rgba(255, 255, 255, 0.4);
  --label-prev: #ffffff;
  --label-colors: #ffffff;

  --btn-primary: linear-gradient(90deg, #ffffff, #ffffff);
  --btn-primary-hover: linear-gradient(90deg, #f5f5f5, #f5f5f5);
  --btn-primary-text: #000000;
  --btn-secondary-bg: #1a1a1a;
  --btn-secondary-hover-bg: #2a2a2a;

  --footer-color: rgba(255, 255, 255, 0.3);
  --slider-accent: #ffffff;
  --dice-radius: 8px;
}

body{
  background: var(--bg-gradient);
  color: var(--body-color);
  font-family:'Inter',system-ui,sans-serif;
  min-height:100vh;
  transition: background 0.6s ease;
}
.header-font{
  font-family: var(--header-font);
  letter-spacing: var(--header-tracking);
}
.header-gradient-text{
  background-image: var(--header-gradient);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}


.theme-bar{
  display:flex; justify-content:center; gap:8px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.theme-chip{
  position: relative;
  padding: 10px 20px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.2em;
  cursor: pointer;
  border: 1px solid var(--chip-border, rgba(255,255,255,0.18));
  background: var(--chip-bg, rgba(255,255,255,0.05));
  color: var(--chip-fg, rgba(255,255,255,0.7));
  backdrop-filter: blur(10px);
  transition: all 0.25s ease;
  display: inline-flex; align-items: center; gap: 10px;
}
.theme-chip:hover{
  border-color: var(--chip-border-hover, rgba(255,255,255,0.4));
  color: var(--chip-fg-active, #fff);
  transform: translateY(-1px);
}
.theme-chip.active{
  background: var(--chip-bg-active, rgba(255,255,255,0.15));
  border-color: var(--chip-border-active, rgba(255,255,255,0.6));
  color: var(--chip-fg-active, #fff);
  box-shadow: 0 4px 20px var(--chip-glow, rgba(255,255,255,0.1));
}
.theme-chip .swatch{
  width: 14px; height: 14px; border-radius: 4px;
  box-shadow: 0 0 0 1px var(--chip-swatch-ring, rgba(255,255,255,0.25));
}

.dice{
  width:148px;height:148px;
  display:flex;align-items:center;justify-content:center;
  font-size:5rem;font-weight:800;color:white;
  letter-spacing:-2px;
  border-radius: var(--dice-radius);
  position:relative;
  cursor:default;
  transition:transform 0.2s cubic-bezier(0.4,0,0.2,1), box-shadow 0.2s ease, border-radius 0.4s ease;
  background-image:
    linear-gradient(155deg,
      rgba(255,255,255,0.18) 0%,
      rgba(255,255,255,0.04) 40%,
      transparent 60%,
      rgba(0,0,0,0.12) 100%);
  box-shadow:
    0 1px 1px rgba(255,255,255,0.4) inset,
    0 -1px 1px rgba(0,0,0,0.15) inset,
    0 1px 2px rgba(0,0,0,0.2),
    0 4px 8px rgba(0,0,0,0.25),
    0 12px 24px rgba(0,0,0,0.35),
    0 24px 48px -8px rgba(0,0,0,0.4),
    0 0 40px -5px var(--die-glow, rgba(255,255,255,0.3)),
    0 0 80px -20px var(--die-glow, rgba(255,255,255,0.4));
  overflow:hidden;
  isolation:isolate;
  transform-origin:center center;
}
.dice::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:50%;
  background:linear-gradient(
    180deg,
    rgba(255,255,255,0.22) 0%,
    rgba(255,255,255,0.05) 50%,
    transparent 100%
  );
  pointer-events:none;
  border-radius: var(--dice-radius) var(--dice-radius) 0 0;
  z-index:1;
}
.dice::after{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(circle at 18% 18%, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.35) 4%, transparent 5%),
    radial-gradient(circle at 82% 18%, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.3) 4%, transparent 5%),
    radial-gradient(circle at 18% 82%, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.3) 4%, transparent 5%),
    radial-gradient(circle at 82% 82%, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.35) 4%, transparent 5%);
  pointer-events:none;
  border-radius: var(--dice-radius);
  z-index:1;
}
.dice span.die-letter{
  position:relative;z-index:2;
  font-weight:800;
  text-shadow:
    0 1px 2px rgba(0,0,0,0.5),
    0 0 8px rgba(255,255,255,0.9),
    0 0 16px var(--die-glow, rgba(255,255,255,0.6)),
    0 0 32px var(--die-glow, rgba(255,255,255,0.4)),
    0 0 48px var(--die-glow, rgba(255,255,255,0.3));
}
.dice:hover:not(.rolling){
  transform:translateY(-3px);
  box-shadow:
    0 1px 1px rgba(255,255,255,0.4) inset,
    0 -1px 1px rgba(0,0,0,0.15) inset,
    0 2px 4px rgba(0,0,0,0.2),
    0 8px 16px rgba(0,0,0,0.3),
    0 20px 40px rgba(0,0,0,0.4),
    0 32px 64px -8px rgba(0,0,0,0.45),
    0 0 50px -5px var(--die-glow, rgba(255,255,255,0.5)),
    0 0 100px -20px var(--die-glow, rgba(255,255,255,0.5));
}
.dice.rolling{
  box-shadow:
    0 1px 1px rgba(255,255,255,0.4) inset,
    0 -1px 1px rgba(0,0,0,0.15) inset,
    0 4px 8px rgba(0,0,0,0.3),
    0 16px 32px rgba(0,0,0,0.4),
    0 0 60px -5px var(--die-glow, rgba(255,255,255,0.6)),
    0 0 120px -15px var(--die-glow, rgba(255,255,255,0.5));
}
.dice-container{perspective:1600px;}

.dice-wrap{
  position:relative;
  display:inline-block;
}
.dice-wrap::after{
  content:'';position:absolute;
  bottom:-14px;left:50%;
  transform:translateX(-50%);
  width:130px;height:14px;
  background:radial-gradient(ellipse, rgba(0,0,0,0.4), transparent 70%);
  filter:blur(3px);
  pointer-events:none;
  opacity:0;
  transition:opacity 0.3s ease;
  z-index:-1;
}
.dice-wrap.rolling::after{opacity:1;}

.mini-die{
  width:58px;height:58px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.85rem;font-weight:900;color:white;
  border-radius: calc(var(--dice-radius) * 0.4);
  text-shadow:0 2px 6px rgba(0,0,0,0.7);
  box-shadow:
    inset 0 5px 10px -2px rgba(255,255,255,0.45),
    inset 0 -5px 10px -2px rgba(0,0,0,0.55),
    0 0 0 4px rgba(255,255,255,0.85),
    0 8px 16px -4px rgba(0,0,0,0.5);
  position:relative;
}
.mini-die.placeholder{
  background:rgba(255,255,255,0.04) !important;
  color:rgba(255,255,255,0.25);
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,0.1),
    0 0 0 4px rgba(255,255,255,0.08);
  font-size:1.5rem;
}

@keyframes throwAndLand{
  0%   {transform: rotate(0deg);}
  100% {transform: rotate(1440deg);}
}
.rolling{
  animation: throwAndLand 5000ms cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
}

.table-felt{
  background: var(--felt-bg);
  box-shadow:
    inset 0 0 180px rgba(0,0,0,0.9),
    inset 0 0 60px var(--felt-inset-glow),
    0 0 100px var(--felt-outer-glow),
    0 30px 60px -15px rgba(0,0,0,0.6);
  border:14px solid var(--felt-border);
  border-radius:44px;
  position:relative;
  transition: background 0.6s ease, border-color 0.6s ease, box-shadow 0.6s ease;
}
.table-felt::before{
  content:'';position:absolute;inset:14px;
  border:2px dashed var(--felt-dash);
  border-radius:32px;
  pointer-events:none;
}

.crypto-badge{
  background: var(--badge-bg);
  border:1px solid var(--badge-border);
  transition: background 0.5s ease, border-color 0.5s ease;
}
.badge-accent-1{color: var(--badge-accent-1);}
.badge-accent-2{color: var(--badge-accent-2);}

.panel-prev{
  background: var(--panel-bg);
  border-color: var(--panel-border-prev);
  transition: background 0.5s ease, border-color 0.5s ease;
}
.panel-colors{
  background: var(--panel-bg);
  border-color: var(--panel-border-colors);
  transition: background 0.5s ease, border-color 0.5s ease;
}
.label-prev{color: var(--label-prev);}
.label-colors{color: var(--label-colors);}

.btn-primary{
  background: var(--btn-primary);
  color: var(--btn-primary-text);
}
.btn-primary:hover{background: var(--btn-primary-hover);}
.btn-secondary{
  background: var(--btn-secondary-bg);
  color: var(--btn-secondary-text);
}
.btn-secondary:hover{background: var(--btn-secondary-hover-bg);}

.control-btn{transition:all 0.2s cubic-bezier(0.4,0,0.2,1);}
.control-btn:hover{transform:translateY(-3px);box-shadow:0 25px 30px -8px rgba(0,0,0,0.3);}
.control-btn:active{transform:translateY(-1px);}

.footer-text{color: var(--footer-color);}
input[type="range"]{accent-color: var(--slider-accent);}


.prev-collapsible{
  max-height: 240px;
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease, padding 0.3s ease;
  opacity: 1;
}
.prev-collapsible.collapsed{
  max-height: 0;
  opacity: 0;
}
#prev-roll-chevron.collapsed{
  transform: rotate(-90deg);
}
#prev-roll-toggle:hover #prev-roll-chevron{
  opacity: 0.7;
}
</style>
</head>
<body class="flex items-center justify-center p-6">
<div class="max-w-5xl w-full mx-auto">


  <div class="theme-bar" id="theme-bar">
    <div class="theme-chip active" data-theme-key="classic">
      <span class="swatch" style="background:linear-gradient(135deg,#14b8a6,#a855f7)"></span> CLASSIC
    </div>
    <div class="theme-chip" data-theme-key="forest">
      <span class="swatch" style="background:linear-gradient(135deg,#84cc16,#14532d)"></span> FOREST
    </div>
    <div class="theme-chip" data-theme-key="vapor">
      <span class="swatch" style="background:linear-gradient(135deg,#e879f9,#67e8f9)"></span> VAPOR
    </div>
    <div class="theme-chip" data-theme-key="royal">
      <span class="swatch" style="background:linear-gradient(135deg,#fbbf24,#7f1d1d)"></span> ROYAL
    </div>
    <div class="theme-chip" data-theme-key="mono">
      <span class="swatch" style="background:linear-gradient(135deg,#ffffff,#000000)"></span> MONO
    </div>
  </div>

  <div class="text-center mb-10">
    <h1 class="header-font header-gradient-text text-5xl md:text-6xl drop-shadow-2xl">CHROMA-DICE.COM</h1>
    <div class="mt-5 inline-flex items-center gap-x-3 crypto-badge text-base md:text-lg font-bold px-8 py-4 rounded-3xl shadow-2xl backdrop-blur-md" style="color:var(--body-color)">
      <span class="text-2xl">🔐</span>
      <span>100% UNRIGGABLE</span>
      <span class="badge-accent-1">•</span>
      <span>TRULY RANDOM</span>
      <span class="badge-accent-2">•</span>
      <span>GAME READY</span>
      <span class="text-2xl">🎲</span>
    </div>
    <p class="text-lg mt-4 tracking-[0.3em]" style="color:var(--subtitle-color)">4 DICE · 6 COLORS · POWERED BY Math.random()</p>
  </div>

  <div class="table-felt p-10 md:p-14 shadow-2xl mb-6">
    <div id="dice-row" class="dice-container flex justify-center gap-8 md:gap-12 flex-wrap"></div>
  </div>

  <div id="prev-roll-banner" class="mb-6 panel-prev backdrop-blur-xl rounded-3xl px-8 py-6 border shadow-2xl">
    <button id="prev-roll-toggle" type="button" class="w-full flex items-center justify-between gap-3 cursor-pointer select-none bg-transparent border-0 p-0" style="color:inherit">
      <span class="label-prev text-sm font-bold tracking-[0.3em]">⬅ PREVIOUS ROLL</span>
      <span id="prev-roll-chevron" class="label-prev text-base font-bold transition-transform duration-300" style="display:inline-block">▾</span>
    </button>
    <div id="prev-roll-body" class="prev-collapsible">
      <div id="prev-roll-dice" class="flex justify-center gap-5 flex-wrap pt-5"></div>
    </div>
  </div>

  <div class="mb-10 panel-colors backdrop-blur-xl rounded-3xl px-8 py-6 border shadow-2xl">
    <p class="label-colors text-sm font-bold tracking-[0.3em] text-center mb-4">🎯 POSSIBLE COLORS · PICK YOUR FAVORITE</p>
